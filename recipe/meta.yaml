{% set name = "grapharray" %}
{% set version = "1.0.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/grapharray-{{ version }}.tar.gz
  sha256: bf883c73118cf753cf8b9f98847f94cc241708013ab8c1d7a158ce14e0295d16

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - networkx >=2.6.2
    - numpy >=1.20.3
    - python >={{ python_min }}
    - scipy >=1.7.1

test:
  imports:
    - grapharray
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Geb-algebra/grapharray
  summary: 'GraphArray : Python package for treating arrays defined on a network, which allows for fast computation and easy visualization.'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Geb-algebra
